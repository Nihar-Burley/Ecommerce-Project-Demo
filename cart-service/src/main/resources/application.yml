server:
  port: 8082

spring:
  application:
    name: cart-service

  r2dbc:
    url: r2dbc:h2:mem:///cartdb
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

logging:
  level:
    root: INFO
    com.company.cart: DEBUG
    org.springframework.r2dbc: DEBUG

# Product Service
product:
  service:
    base-url: http://localhost:8081

# Actuator (Optional but recommended)
management:
  endpoints:
    web:
      exposure: *


# Swagger/OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html